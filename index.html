<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sprawdzenie Tokenu</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg,#1a1a1a,#111);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      margin: 0;
      padding-top: 80px;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 30px;
      color: #e0e0e0;
      text-shadow: 0 0 10px #6a00d4;
    }
    #status {
      font-size: 1.8em;
      padding: 20px 30px;
      border-radius: 12px;
      background: #222;
      box-shadow: 0 0 20px rgba(106,0,212,0.5);
      min-width: 350px;
      text-align: center;
      transition: all 0.3s ease;
    }
    .ok {
      color: #0f0;
      font-weight: bold;
      text-shadow: 0 0 10px #0f0;
    }
    .fail {
      color: #f33;
      font-weight: bold;
      text-shadow: 0 0 10px #f33;
    }
  </style>
</head>
<body>
  <h1>Sprawdzenie tokenu</h1>
  <div id="status">Przekierowanie...</div>

<script>
const statusEl = document.getElementById("status");
statusEl.innerHTML = '<span class="ok">Token poprawny ✅ Przekierowanie...</span>';
setTimeout(() => {
  window.location.href = "przekierowanie.html";
}, 1000);
</script>
</body>
</html>
